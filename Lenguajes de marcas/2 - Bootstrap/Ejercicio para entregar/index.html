<!doctype html>
<html lang="es">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="estilo.css">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

  </head>
  <body>

    <div class="container-fluid">

      <!-- Encabezado -->
      <div class="row">
          <div class="col encabezado d-flex justify-content-center align-items-center">
            <img src="Multimedia/logo.png" rel="logo">
          </div>
      </div>

        <!-- navegador -->
      <div class="row">
        <div class="col-12">
          <ul class="nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Flores Silvestres</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Flores de Interior</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Flores secas</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Flores secas</a>
            </li>
            <li class="nav-item" >
              <a class="nav-link active" aria-current="page" href="#">Arboles</a>
            </li>
          </ul>
        </div>
      </div>

      <!-- vídeos y fotos -->
  
      <div class="row d-flex justify-content-center">
        <div class="col-5 video d-flex justify-content-center align-items-center">         
          <video>
            <source src="Multimedia/video.mp4" autoplay></source>type="video/mp4">
          </video>
        </div>

        <div class="col-6 fotoPrimera d-flex flex-wrap justify-content-center align-items-center">
          <img src="Multimedia/Flor1.jpg" rel="flores" width="350px" height="250px">
        
          <img src="Multimedia/Flor2.jpg" rel="flores" width="350px" height="250px">
    
          <img src="Multimedia/Flor3.jpg" rel="flores" width="350px" height="250px">

          <img src="Multimedia/Flor4.jpg" rel="flores" width="350px" height="250px">
        </div>
      </div>


      <!-- Sección-->

        
        <div class="row">
          <div class="col tituloSeccion d-flex justify-content-center align-items-center">          
            <h1>Nuestros productos</h1>
          </div>
        </div>
        
        <div class="row">
          <!-- Primera imagen y texto -->
          <div class="col-md-4">
            <img src="ruta_a_tu_imagen_1.jpg" class="img-fluid" alt="Imagen 1">
            <p class="text-center">Texto 1</p>
          </div>
          <!-- Segunda imagen y texto -->
          <div class="col-md-4">
            <img src="ruta_a_tu_imagen_2.jpg" class="img-fluid" alt="Imagen 2">
            <p class="text-center">Texto 2</p>
          </div>
          <!-- Tercera imagen y texto -->
          <div class="col-md-4">
            <img src="ruta_a_tu_imagen_3.jpg" class="img-fluid" alt="Imagen 3">
            <p class="text-center">Texto 3</p>
          </div>
        </div>
   


        <!-- Formulario-->
      <div class="row justify-content-center align-items-center">
          <div class="col-sm-1 formContacto">
            <img src="Multimedia/logo.png" rel="logo">
          </div>
      </div>           


        <!-- Redes sociales-->
      <div class="row justify-content-center align-items-center">
          <div class="col-sm-1 redes">
            <img src="Multimedia/logo.png" rel="logo">
          </div>
      </div>  

    </div>
    
    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
    -->
  </body>
</html>
